<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stiven Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #060b13;
            --bg-card: #0f172a;
            --primary-cyan: #00f2fe;
            --primary-pink: #4facfe;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --border-color: rgba(0, 242, 254, 0.15);
            --active-chat-bg: rgba(0, 242, 254, 0.08);
            --male-color: #00f2fe;
            --female-color: #ff4fac;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            background: var(--bg-main);
            position: relative;
        }

        .sidebar {
            width: 350px;
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background: #09111e;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .profile-section {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.6);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--primary-cyan);
            object-fit: cover;
        }

        .user-details h3 {
            font-size: 15px;
            color: var(--text-main);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .search-box {
            padding: 15px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 35px 10px 15px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            outline: none;
            font-size: 14px;
        }

        .search-box i {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: all 0.2s ease;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid transparent;
        }

        .user-item:hover, .user-item.active {
            background: var(--active-chat-bg);
            border-color: var(--border-color);
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
            transition: all 0.3s ease;
        }

        .chat-header {
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.6);
        }

        .back-btn {
            display: none;
            background: none;
            border: none;
            color: var(--primary-cyan);
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            margin-left: 10px;
        }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 65%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        .message.sent {
            align-self: flex-start;
            background: linear-gradient(135deg, var(--primary-pink), var(--primary-cyan));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-end;
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        .empty-chat-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            gap: 15px;
        }

        .empty-chat-state i {
            font-size: 50px;
            color: var(--primary-pink);
            animation: pulse 2s infinite;
        }

        .chat-input-area {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.6);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 25px;
            padding: 5px 15px;
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-main);
            padding: 10px;
            outline: none;
            font-size: 15px;
        }

        .send-btn {
            background: linear-gradient(135deg, var(--primary-pink), var(--primary-cyan));
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.6; }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
            }

            .chat-area {
                width: 100%;
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                display: none;
                z-index: 20;
            }

            .back-btn {
                display: block;
            }

            .app-container.chat-active .chat-area {
                display: flex;
            }
            .app-container.chat-active .sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="app-container" id="appContainer">
        <aside class="sidebar">
            <div class="profile-section">
                <div class="user-info">
                    <img src="" alt="الملف الشخصي" class="avatar" id="myAvatar">
                    <div class="user-details">
                        <h3 id="myUsername">جاري التحميل...</h3>
                        <span class="text-muted" style="font-size: 12px;"><span class="status-dot"></span>متصل</span>
                    </div>
                </div>
            </div>

            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="userSearch" placeholder="ابحث عن مستخدم ...">
            </div>

            <div class="users-list" id="usersList"></div>
        </aside>

        <main class="chat-area">
            <div class="empty-chat-state" id="emptyChat">
                <i class="fas fa-comments"></i>
                <h2>Stiven Chat</h2>
                <p>لا رسائل بعد</p>
            </div>

            <div id="activeChatContent" style="display: none; flex-direction: column; height: 100%;">
                <div class="chat-header">
                    <button class="back-btn" id="backToSidebar"><i class="fas fa-arrow-right"></i></button>
                    <img src="" alt="المستلم" class="avatar" id="chatHeaderAvatar">
                    <div class="user-details">
                        <h3 id="chatHeaderName">اسم المستخدم</h3>
                        <span id="chatHeaderStatus" style="font-size: 12px; color: var(--text-muted);">غير متصل</span>
                    </div>
                </div>

                <div class="messages-container" id="messagesContainer"></div>

                <div class="chat-input-area">
                    <div class="input-wrapper">
                        <input type="text" id="messageInput" placeholder="اكتب رسالة هنا...">
                        <button class="send-btn" id="sendMessageBtn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, where, getDocs
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            authDomain: "stiven-chat.firebaseapp.com",
            projectId: "stiven-chat",
            storageBucket: "stiven-chat.appspot.com",
            messagingSenderId: "109315510488",
            appId: "1:109315510488:web:96e838634e56598375836d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let activeChatUserId = null;
        let unsubscribeMessages = null;

        const appContainer = document.getElementById('appContainer');
        const emptyChat = document.getElementById('emptyChat');
        const activeChatContent = document.getElementById('activeChatContent');
        const chatHeaderName = document.getElementById('chatHeaderName');
        const chatHeaderAvatar = document.getElementById('chatHeaderAvatar');
        const chatHeaderStatus = document.getElementById('chatHeaderStatus');
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendMessageBtn = document.getElementById('sendMessageBtn');
        const usersListElement = document.getElementById('usersList');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('myUsername').innerText = user.displayName || user.email;
                document.getElementById('myAvatar').src = user.photoURL || 'https://via.placeholder.com/150';
                loadUsers();
            } else {
                window.location.href = 'login.html';
            }
        });

        function loadUsers() {
            onSnapshot(collection(db, "users"), (snapshot) => {
                usersListElement.innerHTML = '';
                snapshot.forEach((doc) => {
                    const userData = doc.data();
                    if (userData.uid !== currentUser.uid) {
                        const userItem = document.createElement('div');
                        userItem.className = 'user-item';
                        userItem.setAttribute('data-id', userData.uid);
                        
                        const genderColor = userData.gender === 'female' ? 'var(--female-color)' : 'var(--male-color)';
                        
                        userItem.innerHTML = `
                            <img src="${userData.photoURL || 'https://via.placeholder.com/150'}" alt="${userData.username}" class="avatar" style="border-color: ${genderColor}">
                            <div class="user-details">
                                <h3 style="color: ${genderColor}">${userData.username}</h3>
                                <span style="font-size: 12px; color: var(--text-muted);">${userData.status || 'غير متصل'}</span>
                            </div>
                        `;
                        usersListElement.appendChild(userItem);
                    }
                });
                setupUserClickEvents(snapshot);
            });
        }

        function setupUserClickEvents(snapshot) {
            document.querySelectorAll('.user-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.user-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');

                    const userId = item.getAttribute('data-id');
                    activeChatUserId = userId;

                    let clickedUser = null;
                    snapshot.forEach(doc => {
                        if (doc.data().uid === userId) clickedUser = doc.data();
                    });

                    if (clickedUser) {
                        emptyChat.style.display = 'none';
                        activeChatContent.style.display = 'flex';

                        chatHeaderName.innerText = clickedUser.username;
                        chatHeaderAvatar.src = clickedUser.photoURL || 'https://via.placeholder.com/150';
                        chatHeaderStatus.innerText = clickedUser.status || 'غير متصل';

                        const genderColor = clickedUser.gender === 'female' ? 'var(--female-color)' : 'var(--male-color)';
                        chatHeaderName.style.color = genderColor;
                        chatHeaderAvatar.style.borderColor = genderColor;

                        appContainer.classList.add('chat-active');

                        loadMessages(userId);
                    }
                });
            });
        }

        document.getElementById('backToSidebar').addEventListener('click', () => {
            appContainer.classList.remove('chat-active');
        });

        function loadMessages(targetUserId) {
            if (unsubscribeMessages) unsubscribeMessages();

            const chatId = [currentUser.uid, targetUserId].sort().join('_');
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));

            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                messagesContainer.innerHTML = '';
                if (snapshot.empty) {
                    messagesContainer.innerHTML = `<div style="text-align:center; color:var(--text-muted); margin-top:20px;">💌 لا رسائل بعد</div>`;
                    return;
                }
                snapshot.forEach((doc) => {
                    const msg = doc.data();
                    const msgElement = document.createElement('div');
                    msgElement.className = `message ${msg.senderId === currentUser.uid ? 'sent' : 'received'}`;
                    msgElement.innerText = msg.text;
                    messagesContainer.appendChild(msgElement);
                });
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !activeChatUserId) return;

            const chatId = [currentUser.uid, activeChatUserId].sort().join('_');
            messageInput.value = '';

            await addDoc(collection(db, "chats", chatId, "messages"), {
                senderId: currentUser.uid,
                text: text,
                timestamp: new Date()
            });
        }

        sendMessageBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
