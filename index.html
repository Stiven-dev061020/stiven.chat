<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>stiven · دردشة خاصة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBGgQjtb75Z5rsa0QxIGwau06m771k2BvA",
      authDomain: "stiven-chat.firebaseapp.com",
      projectId: "stiven-chat",
      storageBucket: "stiven-chat.firebasestorage.app",
      messagingSenderId: "1049787541567",
      appId: "1:1049787541567:web:8a8769ea7a7355d7cc308a",
      measurementId: "G-M0TTJ9NV0R"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.__FB = { auth, db, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, updateDoc, getDoc };
    window.dispatchEvent(new Event("fb-ready"));
  </script>

  <style>
    :root {
      --bg: #111b21; --surface: #202c33; --surface2: #2a3942;
      --border: #3b4a54; --accent: #00a884; --accent2: #008069;
      --text: #e9edef; --muted: #8696a0; --me: #005c4b; --out: #202c33;
      --font: 'Cairo', sans-serif;
    }

    html, body {
      height: 100%; margin: 0; padding: 0;
      background: var(--bg); color: var(--text);
      font-family: var(--font); overflow: hidden;
    }

    #chat-screen {
      display: flex; flex-direction: column; height: 100vh;
    }

    .hidden { display: none !important; }

    /* AUTH */
    #auth-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
    .card { width: 90%; max-width: 380px; background: var(--surface); padding: 25px; border-radius: 15px; border: 1px solid var(--border); }
    .tabs { display: flex; gap: 5px; margin-bottom: 20px; background: var(--bg); padding: 5px; border-radius: 10px; }
    .tab { flex: 1; border: none; padding: 10px; border-radius: 8px; background: transparent; color: var(--muted); cursor: pointer; }
    .tab.active { background: var(--surface2); color: #fff; }
    .fg { margin-bottom: 15px; }
    .fg input { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: #fff; outline: none; }
    .btn { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 10px; color: #fff; font-weight: bold; }

    /* HEADER */
    .hdr { 
      padding: 10px 15px; background: var(--surface); border-bottom: 1px solid var(--border); 
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .hav { width: 35px; height: 35px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; }

    /* ── شريط الكتابة (تم نقله للأعلى) ── */
    .bar {
      padding: 10px 15px;
      background: var(--surface2);
      border-bottom: 2px solid var(--accent);
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .tinput {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px; color: #fff;
      font-family: var(--font); outline: none; resize: none;
    }
    .sbtn {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--accent); border: none; color: #fff;
    }

    /* MESSAGES AREA */
    .msgs {
      flex: 1; overflow-y: auto; padding: 15px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .brow { display: flex; flex-direction: column; max-width: 85%; }
    .brow.me { align-self: flex-end; }
    .brow.other { align-self: flex-start; }
    .bub { padding: 10px; border-radius: 12px; font-size: 14px; word-break: break-word; }
    .brow.me .bub { background: var(--me); border-bottom-right-radius: 2px; }
    .brow.other .bub { background: var(--surface); border-bottom-left-radius: 2px; }
    
    #footer-credit {
      padding: 5px; text-align: center; font-size: 10px; color: #3b4a54; background: var(--bg);
    }
  </style>
</head>
<body>

<div id="auth-screen">
  <div class="card">
    <div class="tabs">
      <button class="tab active" id="t-login" onclick="switchTab('login')">دخول</button>
      <button class="tab" id="t-reg" onclick="switchTab('reg')">جديد</button>
    </div>
    <div id="log-form">
      <div class="fg"><input type="email" id="l-email" placeholder="البريد الإلكتروني"></div>
      <div class="fg"><input type="password" id="l-pass" placeholder="كلمة السر"></div>
      <button class="btn" onclick="doLogin()">دخول</button>
    </div>
    <div id="reg-form" class="hidden">
      <div class="fg"><input type="text" id="r-name" placeholder="الاسم الكامل"></div>
      <div class="fg"><input type="email" id="r-email" placeholder="البريد"></div>
      <div class="fg"><input type="password" id="r-pass" placeholder="كلمة السر"></div>
      <button class="btn" onclick="doRegister()">إنشاء حساب</button>
    </div>
  </div>
</div>

<div id="chat-screen" class="hidden">
  <div class="hdr">
    <div class="hav">👤</div>
    <div class="hinfo"><h2 id="p-name" style="font-size: 14px;">المحادثة</h2></div>
    <div style="flex:1"></div>
    <button onclick="doLogout()" style="background:none; border:none; color:var(--muted);">خروج</button>
  </div>
  
  <!-- حقل الكتابة هنا أصبح في الأعلى لضمان عمله -->
  <div class="bar">
    <textarea class="tinput" id="msg-in" placeholder="اكتب هنا..." rows="1"></textarea>
    <button class="sbtn" onclick="sendMsg()">➤</button>
  </div>

  <div class="msgs" id="msgs"></div>
  
  <div id="footer-credit">Engineered by abderahmane belkhir</div>
</div>

<script>
  let FB, ME;

  window.addEventListener("fb-ready", () => {
    FB = window.__FB;
    FB.onAuthStateChanged(FB.auth, user => { if(user) { ME = user; enterChat(); } });
  });

  function switchTab(t) {
    document.getElementById("t-login").classList.toggle("active", t==='login');
    document.getElementById("t-reg").classList.toggle("active", t==='reg');
    document.getElementById("log-form").classList.toggle("hidden", t!=='login');
    document.getElementById("reg-form").classList.toggle("hidden", t!=='reg');
  }

  async function doRegister() {
    const n = document.getElementById("r-name").value, e = document.getElementById("r-email").value, p = document.getElementById("r-pass").value;
    const c = await FB.createUserWithEmailAndPassword(FB.auth, e, p);
    await FB.updateProfile(c.user, { displayName: n });
    await FB.setDoc(FB.doc(FB.db, "users", c.user.uid), { name: n, online: true });
  }

  async function doLogin() {
    const e = document.getElementById("l-email").value, p = document.getElementById("l-pass").value;
    await FB.signInWithEmailAndPassword(FB.auth, e, p);
  }

  function doLogout() { FB.signOut(FB.auth).then(() => location.reload()); }

  function enterChat() {
    document.getElementById("auth-screen").classList.add("hidden");
    document.getElementById("chat-screen").classList.remove("hidden");
    listenMsgs();
  }

  function listenMsgs() {
    const q = FB.query(FB.collection(FB.db, "messages"), FB.orderBy("createdAt", "asc"));
    FB.onSnapshot(q, snap => {
      const box = document.getElementById("msgs");
      box.innerHTML = "";
      snap.forEach(d => {
        const m = d.data();
        const isMe = m.uid === ME.uid;
        box.insertAdjacentHTML("beforeend", `
          <div class="brow ${isMe?'me':'other'}">
            <div class="bub">${m.text}</div>
          </div>`);
      });
      box.scrollTop = box.scrollHeight;
    });
  }

  async function sendMsg() {
    const inp = document.getElementById("msg-in"), txt = inp.value.trim();
    if(!txt) return;
    inp.value = "";
    await FB.addDoc(FB.collection(FB.db, "messages"), { text: txt, uid: ME.uid, createdAt: FB.serverTimestamp() });
  }
</script>
</body>
</html>
